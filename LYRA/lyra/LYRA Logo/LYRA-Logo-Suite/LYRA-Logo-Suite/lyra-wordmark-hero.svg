<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100" role="img">
  <title>LYRA — Wordmark only, maximum tracking</title>
  <desc>LYRA wordmark in maximum letter-spacing ultralight weight for hero sections, marketing materials, and billboard applications where the framed mark is not needed</desc>

  <!-- Background -->
  <rect width="480" height="100" rx="6" fill="#080808"/>

  <!-- LYRA wordmark — maximum tracking, hero use -->
  <text x="240" y="60"
    font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="200"
    fill="#d8d8d8"
    letter-spacing="28"
    text-anchor="middle">LYRA</text>

  <!-- Tagline below -->
  <text x="240" y="82"
    font-family="'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="8"
    font-weight="300"
    fill="#444444"
    letter-spacing="5"
    text-anchor="middle">SOCIAL  AT  SIGNAL  STRENGTH</text>
</svg>
