name: LYRA Cron Jobs

on:
  schedule:
    - cron: '*/5 * * * *'   # sync-comments — every 5 minutes
    - cron: '0 * * * *'     # sync-metrics  — every hour
    - cron: '0 2 * * 0'     # brand-refresh — Sunday 2am UTC

jobs:
  sync-comments:
    if: github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-comments
        run: |
          curl -f -X GET "${{ secrets.APP_BASE_URL }}/api/cron/sync-comments" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  sync-metrics:
    if: github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-metrics
        run: |
          curl -f -X GET "${{ secrets.APP_BASE_URL }}/api/cron/sync-metrics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  brand-refresh:
    if: github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger brand-refresh
        run: |
          curl -f -X GET "${{ secrets.APP_BASE_URL }}/api/cron/brand-refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
